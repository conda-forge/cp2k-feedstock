schema_version: 1

context:
  name: cp2k
  version: "2026.1"
  mpi_prefix: "mpi_${{ mpi }}"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/${{ name }}/${{ name }}/releases/download/v${{ version }}/${{ name }}-${{ version }}.tar.bz2
    sha256: 4364c74bcffaa474bc234e11686b09550e4d06932acf2147a341e4f7679dd88e

build:
  number: 5
  script: build.sh
  skip:
    - if: aarch64 or osx or win
      then: true

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("cxx") }}
    - ${{ compiler("fortran") }}
    - cmake >=3.27
    - ninja >=1.13
    - pkgconfig >=1.6
  host:
    - ${{ mpi }} >=5
    - dbcsr >=2.9.0
    - "fftw >=3.3.10 *${{ mpi_prefix }}_*"
    - hdf5 ~=1.14
    - libint >=2.6.0
    - libint-fortran-devel >=2.6.0
    - "libxc >=7.0.0 *cpu_*"
    - "openblas >=0.3.30 *openmp_*"
    - scalapack >=2.2.0
    - spglib >=2.5
    - trexio >2.6
    - if: mpi == "openmpi"
      then:
        - "elpa >=2024.05.001 *${{ mpi_prefix }}_*"
        - "plumed >=2.9.2 *${{ mpi_prefix }}_*"
  run:
    - ${{ mpi }} >=5
    - "openblas >=0.3.30 *openmp_*"

tests:
  - package_contents:
      bin:
        - cp2k.psmp

about:
  homepage: https://www.cp2k.org
  license: GPL-2.0-only
  license_family: GPL
  license_file: LICENSE
  summary: Quantum chemistry and solid state physics software package
  description: |
    CP2K is a quantum chemistry and solid state physics software package 
    that can perform atomistic simulations of solid state, liquid, 
    molecular, periodic, material, crystal, and biological systems. 
  documentation: https://manual.cp2k.org
  repository: https://github.com/cp2k/cp2k

extra:
  recipe-maintainers:
    - jan-janssen
    - oschuett
    - ltalirz
    - mkrack
